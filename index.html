<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Farmácia">
<meta name="theme-color" content="#1C3D0F">
<title>Farmácia de Casa</title>
<style>
:root {
  --bg: #F4F1EB;
  --surface: #FFFFFF;
  --surface2: #EDE9E0;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1A1814;
  --text2: #6B6760;
  --text3: #A09C96;
  --green: #2D5A1B;
  --green-bg: #E4F0D8;
  --green-mid: #639922;
  --amber: #7A4A08;
  --amber-bg: #FAE8C8;
  --amber-mid: #C47D15;
  --red: #8B2020;
  --red-bg: #F9E0E0;
  --red-mid: #C84040;
  --blue: #0F4F8A;
  --blue-bg: #DFF0FF;
  --accent: #1C3D0F;
  --accent2: #2D5A1B;
  --pill: 50px;
  --r: 16px;
  --rsm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141210;
    --surface: #1E1C19;
    --surface2: #2A2824;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #F0EDE6;
    --text2: #9A9690;
    --text3: #6A6660;
    --green-bg: #1A2E10;
    --amber-bg: #2E1E08;
    --red-bg: #2E1010;
    --blue-bg: #0A1E30;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--accent);padding:calc(var(--safe-top) + 14px) 16px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10}
.topbar-title{display:flex;align-items:center;gap:10px}
.topbar-icon{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar h1{font-size:18px;font-weight:600;color:#fff;letter-spacing:-.3px}
.topbar p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:1px}
.topbar-actions{display:flex;gap:8px}
.btn-icon{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.btn-icon:active{background:rgba(255,255,255,0.3)}

/* FILTERS */
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filters::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:6px 14px;border-radius:var(--pill);border:1px solid var(--border2);background:transparent;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip:active{opacity:.7}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 12px 0;flex-shrink:0}
.stat{background:var(--surface);border-radius:var(--rsm);padding:10px 8px;text-align:center;border:1px solid var(--border)}
.stat-n{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-l{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.03em}
.stat-n.red{color:var(--red-mid)}
.stat-n.amber{color:var(--amber-mid)}
.stat-n.green{color:var(--green-mid)}

/* SEARCH */
.search-wrap{padding:10px 12px 4px;flex-shrink:0}
.search{width:100%;padding:10px 14px 10px 38px;border-radius:var(--pill);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:15px;font-family:inherit;outline:none;position:relative}
.search-wrap{position:relative}
.search-icon{position:absolute;left:24px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}

/* LIST */
.list-wrap{flex:1;overflow-y:auto;padding:8px 12px calc(var(--safe-bot) + 80px);-webkit-overflow-scrolling:touch}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 4px 6px;margin-top:4px}

/* CARD */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;transition:transform .1s;position:relative}
.card:active{transform:scale(.98)}
.card-stripe{position:absolute;left:0;top:0;bottom:0;width:4px}
.card-stripe.green{background:var(--green-mid)}
.card-stripe.amber{background:var(--amber-mid)}
.card-stripe.red{background:var(--red-mid)}
.card-stripe.none{background:var(--border2)}
.card-inner{display:flex;align-items:stretch;gap:0;cursor:pointer}
.card-photo{width:72px;height:80px;object-fit:cover;flex-shrink:0;margin-left:4px;border-radius:10px;margin:8px 0 8px 8px;align-self:center}
.card-photo-ph{width:72px;height:80px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;margin:8px 0 8px 8px;background:var(--surface2);border-radius:10px;align-self:center}
.card-content{flex:1;padding:10px 10px 10px 10px;min-width:0}
.card-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.badge{font-size:11px;padding:2px 8px;border-radius:var(--pill);font-weight:500}
.b-cat{background:var(--blue-bg);color:var(--blue)}
.b-open{background:var(--amber-bg);color:var(--amber)}
.b-closed{background:var(--green-bg);color:var(--green)}
.b-exp{background:var(--red-bg);color:var(--red)}
.b-expiring{background:var(--amber-bg);color:var(--amber)}
.b-ok{background:var(--green-bg);color:var(--green)}
.card-detail{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px}
.card-swipe{display:flex;flex-direction:column;justify-content:center;gap:6px;padding:0 10px 0 6px}
.btn-card{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:opacity .15s}
.btn-card:active{opacity:.6}
.btn-edit-c{background:var(--surface2)}
.btn-del-c{background:var(--red-bg)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:15px}

/* FAB */
.fab{position:fixed;bottom:calc(var(--safe-bot) + 20px);right:20px;width:58px;height:58px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(28,61,15,.35);transition:transform .15s,box-shadow .15s;z-index:20}
.fab:active{transform:scale(.92);box-shadow:0 2px 10px rgba(28,61,15,.3)}

/* OVERLAY + SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:92vh;display:flex;flex-direction:column;animation:slideUp .25s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.sheet-header{padding:12px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sheet-header h2{font-size:18px;font-weight:600}
.sheet-body{overflow-y:auto;padding:16px 20px;flex:1}
.sheet-footer{padding:12px 20px calc(var(--safe-bot) + 12px);border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:10px}

/* FORM */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;font-size:15px;padding:12px 14px;border-radius:12px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:none;height:80px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Photo upload */
.photo-up{border:2px dashed var(--border2);border-radius:12px;overflow:hidden;position:relative;cursor:pointer;transition:border-color .15s;min-height:100px;display:flex;align-items:center;justify-content:center}
.photo-up:active{border-color:var(--accent)}
.photo-up input{position:absolute;inset:0;opacity:0;cursor:pointer}
.photo-up-ph{text-align:center;padding:16px}
.photo-up-ph .ph-icon{font-size:32px;margin-bottom:6px}
.photo-up-ph p{font-size:13px;color:var(--text3)}
.photo-up img{width:100%;max-height:200px;object-fit:cover;display:block}
.photo-remove{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}

/* Buttons */
.btn-primary{flex:1;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s}
.btn-primary:active{opacity:.8}
.btn-secondary{flex:1;padding:14px;background:var(--surface2);color:var(--text);border:none;border-radius:14px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer}
.btn-danger{flex:1;padding:14px;background:var(--red-bg);color:var(--red);border:none;border-radius:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}

/* DETAIL */
.detail-photo{width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-bottom:14px;display:block}
.detail-ph{width:100%;height:120px;background:var(--surface2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:14px}
.detail-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border:none}
.detail-lbl{font-size:13px;color:var(--text2);flex-shrink:0;padding-right:12px}
.detail-val{font-size:14px;font-weight:500;text-align:right;word-break:break-word;max-width:65%}
.detail-notes{background:var(--surface2);border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.6;color:var(--text2);margin-top:10px}

/* MENU */
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.menu-overlay.open{display:flex}
.menu-sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:560px;padding:8px 16px calc(var(--safe-bot) + 16px)}
.menu-btn{width:100%;padding:16px;background:none;border:none;font-size:16px;color:var(--text);font-family:inherit;text-align:left;cursor:pointer;border-radius:12px;display:flex;align-items:center;gap:12px}
.menu-btn:active{background:var(--surface2)}
.menu-divider{height:1px;background:var(--border);margin:4px 0}

/* Toast */
.toast{position:fixed;bottom:calc(var(--safe-bot) + 90px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--pill);font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <div class="topbar-icon">💊</div>
    <div>
      <h1>Farmácia de Casa</h1>
      <p id="topSub">a carregar…</p>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="btn-icon" onclick="openMenu()" title="Menu">⋮</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search" id="search" type="search" placeholder="Pesquisar medicamento…" oninput="render()">
</div>

<div class="filters" id="filters">
  <button class="chip active" data-f="all" onclick="setFilter('all',this)">Todos</button>
  <button class="chip" data-f="expired" onclick="setFilter('expired',this)">🔴 Expirados</button>
  <button class="chip" data-f="expiring" onclick="setFilter('expiring',this)">🟡 A expirar</button>
  <button class="chip" data-f="ok" onclick="setFilter('ok',this)">🟢 Válidos</button>
  <button class="chip" data-f="open" onclick="setFilter('open',this)">Abertos</button>
  <button class="chip" data-f="closed" onclick="setFilter('closed',this)">Fechados</button>
</div>

<div class="list-wrap" id="listWrap"></div>

<button class="fab" onclick="openAdd()">+</button>
<div class="toast" id="toast"></div>

<!-- ADD/EDIT SHEET -->
<div class="overlay" id="formOverlay" onclick="formOverlayTap(event)">
<div class="sheet" id="formSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2 id="formTitle">Novo medicamento</h2>
    <button class="btn-icon" style="background:var(--surface2);color:var(--text)" onclick="closeForm()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label>Fotografia</label>
      <div class="photo-up" id="photoUp">
        <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event)" id="photoInput">
        <div class="photo-up-ph" id="photoPlaceholder">
          <div class="ph-icon">📷</div>
          <p>Toca para fotografar ou escolher imagem</p>
        </div>
        <img id="photoPreview" style="display:none">
        <button class="photo-remove" id="photoRemove" style="display:none" onclick="removePhoto(event)">✕</button>
      </div>
    </div>
    <div class="field">
      <label>Nome *</label>
      <input id="fName" placeholder="ex: Brufen 400mg, Bepanthene…" autocomplete="off">
    </div>
    <div class="row2">
      <div class="field">
        <label>Categoria</label>
        <select id="fCat">
          <option>Comprimidos</option><option>Cápsulas</option>
          <option>Pomada / Gel</option><option>Xarope</option>
          <option>Gotas</option><option>Penso / Curativo</option>
          <option>Spray</option><option>Supositório</option>
          <option>Injetável</option><option>Outro</option>
        </select>
      </div>
      <div class="field">
        <label>Estado</label>
        <select id="fOpen">
          <option value="closed">Fechado</option>
          <option value="open">Aberto</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Validade (MM/AAAA)</label>
        <input id="fExp" placeholder="ex: 06/2027" maxlength="7" inputmode="numeric">
      </div>
      <div class="field">
        <label>Quantidade</label>
        <input id="fQty" placeholder="ex: 20 cp, 1 tubo">
      </div>
    </div>
    <div class="field">
      <label>Localização</label>
      <input id="fLoc" placeholder="ex: Armário casa de banho">
    </div>
    <div class="field">
      <label>Notas / Indicação</label>
      <textarea id="fNotes" placeholder="Para que serve, dosagem, observações…"></textarea>
    </div>
  </div>
  <div class="sheet-footer">
    <button class="btn-secondary" onclick="closeForm()">Cancelar</button>
    <button class="btn-primary" onclick="saveMed()">Guardar</button>
  </div>
</div>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="detailOverlay" onclick="detailOverlayTap(event)">
<div class="sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2 id="dTitle" style="font-size:16px;max-width:80%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></h2>
    <button class="btn-icon" style="background:var(--surface2);color:var(--text)" onclick="closeDetail()">✕</button>
  </div>
  <div class="sheet-body" id="dBody"></div>
  <div class="sheet-footer">
    <button class="btn-danger" id="dDelBtn">🗑 Apagar</button>
    <button class="btn-primary" id="dEditBtn">✏️ Editar</button>
  </div>
</div>
</div>

<!-- MENU SHEET -->
<div class="menu-overlay" id="menuOverlay" onclick="menuOverlayTap(event)">
<div class="menu-sheet">
  <div class="sheet-handle" style="margin-bottom:8px"></div>
  <button class="menu-btn" onclick="exportData()">📤 <span><strong>Exportar dados</strong><br><small style="color:var(--text3)">Guarda ficheiro JSON na BeeStation</small></span></button>
  <button class="menu-btn" onclick="triggerImport()">📥 <span><strong>Importar dados</strong><br><small style="color:var(--text3)">Carrega ficheiro JSON guardado</small></span></button>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  <div class="menu-divider"></div>
  <button class="menu-btn" onclick="clearExpired()">🧹 <span><strong>Limpar expirados</strong><br><small style="color:var(--text3)">Remove todos os medicamentos expirados</small></span></button>
  <div class="menu-divider"></div>
  <button class="menu-btn" style="color:var(--text3)" onclick="closeMenu()">Fechar</button>
</div>
</div>

<script>
const EMOJI = {Comprimidos:'💊',Cápsulas:'💊','Pomada / Gel':'🧴',Xarope:'🍶',Gotas:'💧','Penso / Curativo':'🩹',Spray:'💨',Supositório:'🔵',Injetável:'💉',Outro:'📦'};
let meds = JSON.parse(localStorage.getItem('farmacia3') || '[]');
let editId = null, curPhoto = null, curFilter = 'all';

// Sample data
if (!meds.length) {
  const t = new Date();
  const mm = n => String(n).padStart(2,'0');
  meds = [
    {id:1,name:'Brufen 400mg',cat:'Comprimidos',open:'closed',exp:'08/2026',qty:'14 comprimidos',loc:'Armário casa de banho',notes:'Anti-inflamatório. Tomar com alimento.',photo:null},
    {id:2,name:'Paracetamol 1g',cat:'Comprimidos',open:'open',exp:'03/2026',qty:'8 comprimidos',loc:'Armário casa de banho',notes:'Febre e dores. Máx 3g/dia adultos.',photo:null},
    {id:3,name:'Bepanthene pomada',cat:'Pomada / Gel',open:'open',exp:'12/2027',qty:'1 tubo 100g',loc:'Gaveta quarto crianças',notes:'Assaduras e pele irritada das crianças.',photo:null},
    {id:4,name:'Ventilan',cat:'Spray',open:'closed',exp:'06/2027',qty:'1 inalador',loc:'Bolsa escola',notes:'Broncodilatador. Só em caso de necessidade.',photo:null},
    {id:5,name:'Aspirina 500mg',cat:'Comprimidos',open:'closed',exp:'01/2025',qty:'30 comprimidos',loc:'Armário casa de banho',notes:'EXPIRADO — descartar.',photo:null},
  ];
  save();
}

function save() { localStorage.setItem('farmacia3', JSON.stringify(meds)); }

function parseExp(e) {
  if (!e || e.length < 7) return null;
  const [m,y] = e.split('/');
  return new Date(+y, +m-1, 1);
}
function getStatus(e) {
  const d = parseExp(e); if (!d) return 'none';
  const diff = (d - new Date()) / 86400000;
  return diff < 0 ? 'expired' : diff <= 30 ? 'expiring' : 'ok';
}
function statusLabel(s) { return {expired:'Expirado',expiring:'Expira em breve',ok:'Válido',none:''}[s]||''; }
function statusBadge(s) { return {expired:'b-exp',expiring:'b-expiring',ok:'b-ok',none:''}[s]||''; }
function stripeClass(s) { return {expired:'red',expiring:'amber',ok:'green',none:'none'}[s]||'none'; }

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  let list = meds.filter(m => {
    const s = getStatus(m.exp);
    if (curFilter === 'expired' && s !== 'expired') return false;
    if (curFilter === 'expiring' && s !== 'expiring') return false;
    if (curFilter === 'ok' && s !== 'ok') return false;
    if (curFilter === 'open' && m.open !== 'open') return false;
    if (curFilter === 'closed' && m.open !== 'closed') return false;
    if (q && !m.name.toLowerCase().includes(q) && !(m.notes||'').toLowerCase().includes(q) && !(m.cat||'').toLowerCase().includes(q)) return false;
    return true;
  });

  // sort: expired first, then expiring, then by name
  const order = {expired:0,expiring:1,ok:2,none:3};
  list.sort((a,b) => {
    const sa = getStatus(a.exp), sb = getStatus(b.exp);
    if (order[sa] !== order[sb]) return order[sa]-order[sb];
    return a.name.localeCompare(b.name);
  });

  const total = meds.length;
  const expired = meds.filter(m=>getStatus(m.exp)==='expired').length;
  const expiring = meds.filter(m=>getStatus(m.exp)==='expiring').length;
  const openC = meds.filter(m=>m.open==='open').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n amber">${openC}</div><div class="stat-l">Abertos</div></div>
    <div class="stat"><div class="stat-n amber">${expiring}</div><div class="stat-l">A expirar</div></div>
    <div class="stat"><div class="stat-n red">${expired}</div><div class="stat-l">Expirados</div></div>`;

  const now = new Date();
  document.getElementById('topSub').textContent = `${total} medicamento${total!==1?'s':''} · ${now.toLocaleDateString('pt-PT')}`;

  const wrap = document.getElementById('listWrap');
  if (!list.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>Nenhum resultado encontrado.</p></div>`;
    return;
  }

  wrap.innerHTML = list.map(m => {
    const s = getStatus(m.exp);
    const sc = stripeClass(s);
    const sl = statusLabel(s);
    const sb = statusBadge(s);
    const imgHtml = m.photo
      ? `<img class="card-photo" src="${m.photo}" alt="${m.name}" loading="lazy">`
      : `<div class="card-photo-ph">${EMOJI[m.cat]||'📦'}</div>`;
    return `<div class="card" onclick="openDetail(${m.id})">
      <div class="card-stripe ${sc}"></div>
      <div class="card-inner">
        ${imgHtml}
        <div class="card-content">
          <div class="card-name">${m.name}</div>
          <div class="card-badges">
            <span class="badge b-cat">${m.cat}</span>
            <span class="badge ${m.open==='open'?'b-open':'b-closed'}">${m.open==='open'?'Aberto':'Fechado'}</span>
            ${sl?`<span class="badge ${sb}">${sl}</span>`:''}
          </div>
          <div class="card-detail">
            ${m.exp?`<span>📅 ${m.exp}</span>`:''}
            ${m.qty?`<span>· ${m.qty}</span>`:''}
          </div>
        </div>
        <div class="card-swipe" onclick="event.stopPropagation()">
          <button class="btn-card btn-edit-c" onclick="editMed(${m.id})">✏️</button>
          <button class="btn-card btn-del-c" onclick="delConfirm(${m.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// FORM
function openAdd() {
  editId = null; curPhoto = null;
  document.getElementById('formTitle').textContent = 'Novo medicamento';
  ['fName','fExp','fQty','fLoc','fNotes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fCat').value='Comprimidos';
  document.getElementById('fOpen').value='closed';
  setPhotoPreview(null);
  document.getElementById('formOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),300);
}
function editMed(id) {
  const m = meds.find(x=>x.id===id);
  editId=id; curPhoto=m.photo||null;
  document.getElementById('formTitle').textContent='Editar medicamento';
  document.getElementById('fName').value=m.name;
  document.getElementById('fCat').value=m.cat;
  document.getElementById('fOpen').value=m.open;
  document.getElementById('fExp').value=m.exp||'';
  document.getElementById('fQty').value=m.qty||'';
  document.getElementById('fLoc').value=m.loc||'';
  document.getElementById('fNotes').value=m.notes||'';
  setPhotoPreview(m.photo);
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('formOverlay').classList.add('open');
}
function setPhotoPreview(src) {
  const prev=document.getElementById('photoPreview');
  const ph=document.getElementById('photoPlaceholder');
  const rem=document.getElementById('photoRemove');
  document.getElementById('photoInput').value='';
  if(src){prev.src=src;prev.style.display='block';ph.style.display='none';rem.style.display='flex';}
  else{prev.style.display='none';ph.style.display='';rem.style.display='none';}
}
function removePhoto(e){e.stopPropagation();curPhoto=null;setPhotoPreview(null);}
function handlePhoto(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{curPhoto=e.target.result;setPhotoPreview(curPhoto);};
  r.readAsDataURL(f);
}
function saveMed(){
  const name=document.getElementById('fName').value.trim();
  if(!name){showToast('⚠️ Nome obrigatório');return;}
  const exp=document.getElementById('fExp').value.trim();
  if(exp&&!/^\d{2}\/\d{4}$/.test(exp)){showToast('⚠️ Validade: formato MM/AAAA');return;}
  const med={
    id:editId||Date.now(),name,
    cat:document.getElementById('fCat').value,
    open:document.getElementById('fOpen').value,
    exp,qty:document.getElementById('fQty').value.trim(),
    loc:document.getElementById('fLoc').value.trim(),
    notes:document.getElementById('fNotes').value.trim(),
    photo:curPhoto
  };
  if(editId) meds=meds.map(m=>m.id===editId?med:m);
  else meds.push(med);
  save(); closeForm(); render();
  showToast(editId?'✅ Medicamento atualizado':'✅ Medicamento adicionado');
}
function closeForm(){document.getElementById('formOverlay').classList.remove('open');}
function formOverlayTap(e){if(e.target===document.getElementById('formOverlay'))closeForm();}

// DETAIL
function openDetail(id){
  const m=meds.find(x=>x.id===id);
  const s=getStatus(m.exp);
  document.getElementById('dTitle').textContent=m.name;
  document.getElementById('dDelBtn').onclick=()=>delConfirm(id);
  document.getElementById('dEditBtn').onclick=()=>editMed(id);
  document.getElementById('dBody').innerHTML=`
    ${m.photo?`<img class="detail-photo" src="${m.photo}" alt="${m.name}">`:`<div class="detail-ph">${EMOJI[m.cat]||'📦'}</div>`}
    <div class="detail-badges">
      <span class="badge b-cat">${m.cat}</span>
      <span class="badge ${m.open==='open'?'b-open':'b-closed'}">${m.open==='open'?'Aberto':'Fechado'}</span>
      ${statusLabel(s)?`<span class="badge ${statusBadge(s)}">${statusLabel(s)}</span>`:''}
    </div>
    ${m.exp?`<div class="detail-row"><span class="detail-lbl">Validade</span><span class="detail-val">${m.exp}</span></div>`:''}
    ${m.qty?`<div class="detail-row"><span class="detail-lbl">Quantidade</span><span class="detail-val">${m.qty}</span></div>`:''}
    ${m.loc?`<div class="detail-row"><span class="detail-lbl">Localização</span><span class="detail-val">${m.loc}</span></div>`:''}
    ${m.notes?`<div class="detail-notes">${m.notes}</div>`:''}`;
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');}
function detailOverlayTap(e){if(e.target===document.getElementById('detailOverlay'))closeDetail();}

// DELETE
function delConfirm(id){
  const m=meds.find(x=>x.id===id);
  if(!confirm(`Apagar "${m.name}"?`))return;
  meds=meds.filter(x=>x.id!==id);
  save(); closeDetail(); render();
  showToast('🗑 Medicamento apagado');
}

// MENU
function openMenu(){document.getElementById('menuOverlay').classList.add('open');}
function closeMenu(){document.getElementById('menuOverlay').classList.remove('open');}
function menuOverlayTap(e){if(e.target===document.getElementById('menuOverlay'))closeMenu();}

function exportData(){
  const json=JSON.stringify(meds,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;
  a.download=`farmacia_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  closeMenu();
  showToast('📤 Ficheiro exportado');
}
function triggerImport(){document.getElementById('importInput').click();closeMenu();}
function importData(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data))throw new Error();
      if(!confirm(`Importar ${data.length} medicamentos? Os dados actuais serão substituídos.`))return;
      meds=data; save(); render();
      showToast(`✅ ${data.length} medicamentos importados`);
    }catch{showToast('❌ Ficheiro inválido');}
  };
  r.readAsText(f);
  ev.target.value='';
}
function clearExpired(){
  const n=meds.filter(m=>getStatus(m.exp)==='expired').length;
  if(!n){showToast('Nenhum expirado para remover');closeMenu();return;}
  if(!confirm(`Apagar ${n} medicamento${n!==1?'s':''} expirado${n!==1?'s':''}?`))return;
  meds=meds.filter(m=>getStatus(m.exp)!=='expired');
  save(); closeMenu(); render();
  showToast(`🧹 ${n} expirado${n!==1?'s':''} removido${n!==1?'s':''}`);
}

// TOAST
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// VALIDADE AUTO-FORMAT
document.addEventListener('DOMContentLoaded',()=>{
  const fExp=document.getElementById('fExp');
  fExp.addEventListener('input',()=>{
    let v=fExp.value.replace(/\D/g,'');
    if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2,6);
    fExp.value=v;
  });
});

render();
</script>
</body>
</html>
